name: Build and push docker image

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: login docker hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: build image and push to dockerhub
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          Cinjith/CB-Workflow:latest
          Cinjith/CB-Workflow:${{ github.sha }}

    - name: Update application Repo
      run: |
        git clone https://${{ secrets.GITOPS_PAT }}@github.com/Cinjith/argocdrepo.git

        cd argocdrepo

        sed -i "s|image:.*|image: Cinjith/CB-Workflow:${GITHUB_SHA}|g" dep.yaml
        git config user.name "gha"
        git config user.email "gha@github.com"

        git add .
        git commit -m "update image tag to ${GITHUB_SHA}"
        git push
